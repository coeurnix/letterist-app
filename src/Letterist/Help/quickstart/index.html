<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Letterist Quickstart</title>
<style>
:root{--bg:#101722;--panel:#1a2538;--line:#375074;--text:#edf3ff;--muted:#c7d3e9;--accent:#84b8ff;--ok:#89deb5;--warn:#f4d35e;--step-bg:#1e3050}
*{box-sizing:border-box}
body{margin:0;padding:22px 22px 40px;background:radial-gradient(930px 420px at 100% -120px,#28406777 0%,#10172200 60%),var(--bg);color:var(--text);font:15px/1.6 "Segoe UI",Arial,sans-serif}
main{max-width:860px;margin:0 auto}
h1{margin:0 0 4px;font-size:2rem;font-weight:700}
h2{margin:24px 0 8px;font-size:1.3rem;font-weight:600;color:#b8d4ff}
h3{margin:16px 0 6px;font-size:1.05rem;font-weight:600;color:var(--accent)}
p,li{color:var(--muted);line-height:1.65}
.subtitle{color:#9ab3d8;font-size:1.05rem;margin:0 0 16px}
.welcome{border-left:4px solid var(--ok);background:#89deb514;color:#def7ea;padding:12px 14px;border-radius:6px;margin:12px 0 20px;line-height:1.6}
.panel{margin-top:16px;padding:16px 18px;border:1px solid var(--line);border-radius:10px;background:var(--panel)}
.step{margin:12px 0;padding:12px 14px;border-radius:8px;background:var(--step-bg);border-left:3px solid var(--accent)}
.step-num{display:inline-block;background:var(--accent);color:#0d1520;font-weight:700;font-size:0.85rem;width:24px;height:24px;line-height:24px;text-align:center;border-radius:50%;margin-right:8px}
.step-title{font-weight:600;color:var(--text)}
.step p{margin:6px 0 0;font-size:0.93rem}
.tip{margin:10px 0;padding:10px 12px;border-left:3px solid var(--warn);background:#f4d35e0c;border-radius:6px;font-size:0.93rem;color:#e8dbb0}
.tip-label{font-weight:600;color:var(--warn)}
kbd{display:inline-block;background:#263a58;border:1px solid #4a6a9a;border-radius:4px;padding:1px 6px;font-family:Consolas,"Courier New",monospace;font-size:0.88em;color:#d8e6ff}
a{color:var(--accent);text-decoration:none}
a:hover{text-decoration:underline}
.foot{margin-top:20px;padding-top:12px;border-top:1px solid var(--line);color:#8ea8cc;font-size:0.9rem}
.next-link{display:inline-block;margin-top:8px;padding:8px 16px;background:#30466f;border:1px solid #4f73ac;border-radius:8px;color:#eef3ff;font-weight:500}
.next-link:hover{filter:brightness(1.1);text-decoration:none}
@media(max-width:700px){body{padding:14px 14px 30px}.step{padding:10px 12px}}
</style>
</head>
<body>
<main>
<h1 id="title"></h1>
<p class="subtitle" id="subtitle"></p>
<div class="welcome" id="welcome"></div>

<div class="panel" id="stepsPanel">
<h2 id="stepsTitle"></h2>
<div id="steps"></div>
</div>

<div class="panel" id="tipsPanel">
<h2 id="tipsTitle"></h2>
<div id="tips"></div>
</div>

<div class="panel">
<p id="nextText" style="margin:0 0 8px"></p>
<a class="next-link" id="contentsLink" href="../contents/index.html"></a>
</div>

<p class="foot" id="foot"></p>
</main>

<script>
(function(){
function normalizeLanguage(v){
    if(!v)return "en";
    const l=v.toLowerCase();
    if(l.startsWith("zh")) return "zh-cn";
    if(l.startsWith("pt")) return "pt-br";
    if(l.startsWith("es")||l.startsWith("fr")||l.startsWith("de")||l.startsWith("ja")||l.startsWith("ko")) return l.split("-")[0];
    return "en";
}

    stepsTitle:"Your First Lettered Page",
    steps:[
        {t:"Create a new document",d:"Go to <b>File \u2192 New Document</b> or press <kbd>Ctrl+N</kbd>. You can adjust the page size, DPI, and units in <b>File \u2192 Document Settings</b>. Common presets include US Comic, Manga B5, and A4."},

        {t:"Set up panels",d:"Press <kbd>P</kbd> to enter Panel Layout mode. Use the drawing tools (rectangle, rounded rectangle, ellipse) to draw your panel boundaries over the artwork. Press <kbd>P</kbd> again to return to normal editing. Panels help organize your balloons and define reading order."},
        {t:"Create a speech balloon",d:"Press <kbd>B</kbd> or click the Balloon tool in the toolbar, then click on the canvas where you want the balloon. A new balloon appears ready for text. Double-click a balloon at any time to edit its text."},
        {t:"Enter and style dialogue",d:"Type your dialogue into the balloon. Use the <b>Text</b> tab in the right panel to change the font (click the font name to open the font chooser), adjust size, color, and alignment. Select text and press <kbd>Ctrl+B</kbd> for bold, <kbd>Ctrl+I</kbd> for italic, or <kbd>Ctrl+U</kbd> for underline."},
        {t:"Choose a balloon shape",d:"With a balloon selected, use the <b>Balloon</b> tab in the right panel to change its shape. Choose from Oval, Rounded Rectangle, Rectangle, Thought Bubble, Burst, Whisper, and more. Adjust the fill color and stroke as needed."},
        {t:"Add a tail to point to the speaker",d:"Select a balloon and press <kbd>T</kbd> or click <b>Toggle Tail</b> in the toolbar. A tail appears \u2014 drag its tip to point toward the character who is speaking. You can adjust the tail width and curvature in the <b>Tail</b> tab."},
        {t:"Arrange and refine",d:"Click and drag balloons to reposition them. Drag the corner handles to resize. Use <b>Edit \u2192 Align</b> and <b>Edit \u2192 Distribute</b> to line up multiple balloons neatly. If dialogue flows between balloons, select them and use <b>Objects \u2192 Link Balloons</b>."},
        {t:"Add more pages",d:"Press <kbd>Ctrl+Alt+N</kbd> to add new pages. Use the <b>Pages</b> tab in the left panel to navigate between pages, reorder them, or duplicate an existing page. Each page can have its own background artwork."},
        {t:"Export your finished work",d:"Go to <b>File \u2192 Export</b> or press <kbd>Ctrl+Shift+E</kbd>. Choose your format (PNG, JPEG, PDF, CBZ, EPUB, and more), set the DPI and quality, and click Export. You can export a single page or all pages at once."}
    ],
    tipsTitle:"Helpful Tips",
    tips:[
        {l:"Undo mistakes",d:"Press <kbd>Ctrl+Z</kbd> to undo and <kbd>Ctrl+Y</kbd> to redo. Almost every action can be undone, so feel free to experiment."},
        {l:"Use styles for consistency",d:"Save your balloon and text settings as named styles to quickly apply them across your entire project. This keeps your lettering consistent throughout a chapter."},
        {l:"Use templates for speed",d:"Save frequently used balloon configurations as templates. You can assign them to hotkeys (<kbd>Alt+1</kbd> through <kbd>Alt+9</kbd>) for instant placement."},
        {l:"Find and replace text",d:"Press <kbd>Ctrl+F</kbd> to find text across all balloons, or <kbd>Ctrl+H</kbd> to find and replace \u2014 great for last-minute script changes."},
    ],

    nextText:"Ready to learn more? The complete help guide covers every feature in detail.",
    contentsLink:"Open Complete Help Guide",
    foot:"You can search both help pages using the search bar at the top of the help window."

        {t:"Neues Dokument erstellen",d:"Gehen Sie zu <b>Datei \u2192 Neues Dokument</b> oder dr\u00fccken Sie <kbd>Ctrl+N</kbd>. Passen Sie Seitengr\u00f6\u00dfe, DPI und Einheiten in <b>Datei \u2192 Dokumenteinstellungen</b> an. G\u00e4ngige Vorlagen sind US Comic, Manga B5 und A4."},
        {t:"Artwork laden",d:"F\u00fcgen Sie Ihr Artwork als Hintergrundbild hinzu: <b>Objekte \u2192 Bild \u00f6ffnen</b> oder <kbd>Ctrl+Shift+O</kbd>. Sie k\u00f6nnen auch Bilddateien per Drag & Drop auf die Leinwand ziehen."},
        {t:"Panels einrichten",d:"Dr\u00fccken Sie <kbd>P</kbd> f\u00fcr den Panel-Modus. Zeichnen Sie mit den Werkzeugen (Rechteck, abgerundetes Rechteck, Ellipse) Ihre Panelr\u00e4nder. Dr\u00fccken Sie <kbd>P</kbd> erneut, um zur normalen Bearbeitung zur\u00fcckzukehren."},
        {t:"Sprechblase erstellen",d:"Dr\u00fccken Sie <kbd>B</kbd> oder klicken Sie auf das Blasen-Werkzeug, dann klicken Sie auf die Leinwand. Doppelklicken Sie auf eine Blase, um deren Text zu bearbeiten."},
        {t:"Dialog eingeben und gestalten",d:"Geben Sie Ihren Dialog ein. Verwenden Sie den <b>Text</b>-Tab im rechten Panel f\u00fcr Schriftart, Gr\u00f6\u00dfe, Farbe und Ausrichtung. <kbd>Ctrl+B</kbd> f\u00fcr fett, <kbd>Ctrl+I</kbd> f\u00fcr kursiv, <kbd>Ctrl+U</kbd> f\u00fcr unterstrichen."},
        {t:"Blasenform w\u00e4hlen",d:"W\u00e4hlen Sie im <b>Blase</b>-Tab die Form: Oval, Abgerundetes Rechteck, Rechteck, Denkblase, Ausruf, Fl\u00fcstern und mehr."},
        {t:"Schwanz zum Sprecher hinzuf\u00fcgen",d:"W\u00e4hlen Sie eine Blase und dr\u00fccken Sie <kbd>T</kbd>. Ein Schwanz erscheint \u2014 ziehen Sie seine Spitze zum sprechenden Charakter. Breite und Kr\u00fcmmung im <b>Schwanz</b>-Tab anpassen."},
        {t:"Anordnen und verfeinern",d:"Ziehen Sie Blasen zum Neupositionieren. Verwenden Sie <b>Bearbeiten \u2192 Ausrichten</b> und <b>Bearbeiten \u2192 Verteilen</b>. F\u00fcr verbundenen Dialog nutzen Sie <b>Objekte \u2192 Blasen verkn\u00fcpfen</b>."},
        {t:"Weitere Seiten hinzuf\u00fcgen",d:"Dr\u00fccken Sie <kbd>Ctrl+Alt+N</kbd> f\u00fcr neue Seiten. Nutzen Sie den <b>Seiten</b>-Tab im linken Panel zum Navigieren, Neuordnen oder Duplizieren."},
        {t:"Arbeit exportieren",d:"Gehen Sie zu <b>Datei \u2192 Exportieren</b> oder <kbd>Ctrl+Shift+E</kbd>. W\u00e4hlen Sie Format (PNG, JPEG, PDF, CBZ, EPUB u.\u00a0a.), stellen Sie DPI und Qualit\u00e4t ein und klicken Sie auf Exportieren."}
    ],
    tipsTitle:"Hilfreiche Tipps",
    tips:[
        {l:"Fehler r\u00fcckg\u00e4ngig machen",d:"<kbd>Ctrl+Z</kbd> zum R\u00fcckg\u00e4ngigmachen, <kbd>Ctrl+Y</kbd> zum Wiederholen. Fast jede Aktion ist umkehrbar."},
        {l:"Stile f\u00fcr Konsistenz",d:"Speichern Sie Blasen- und Texteinstellungen als benannte Stile f\u00fcr schnelle Wiederverwendung im gesamten Projekt."},
        {l:"Vorlagen f\u00fcr Geschwindigkeit",d:"Speichern Sie h\u00e4ufig genutzte Blasen als Vorlagen und weisen Sie Hotkeys <kbd>Alt+1</kbd> bis <kbd>Alt+9</kbd> zu."},
        {l:"Suchen und Ersetzen",d:"<kbd>Ctrl+F</kbd> zum Suchen in allen Blasen, <kbd>Ctrl+H</kbd> zum Suchen und Ersetzen."},
    ],

    nextText:"M\u00f6chten Sie mehr erfahren? Das vollst\u00e4ndige Handbuch behandelt jede Funktion im Detail.",
    contentsLink:"Vollst\u00e4ndiges Handbuch \u00f6ffnen",
    foot:"Verwenden Sie die Suchleiste oben im Hilfefenster, um beide Seiten zu durchsuchen."
},
"zh-cn":{
    title:"\u5f00\u59cb\u4f7f\u7528 Letterist",
    subtitle:"\u4e00\u6b65\u6b65\u6559\u4f60\u5b8c\u6210\u7b2c\u4e00\u9875\u6f2b\u753b\u5b57\u6548",
    welcome:"\u6b22\u8fce\uff01\u672c\u6307\u5357\u5c06\u5e26\u4f60\u4ece\u5934\u5230\u5c3e\u5b8c\u6210\u7b2c\u4e00\u9875\u6f2b\u753b\u5b57\u6548\u3002\u4f60\u5c06\u5b66\u4f1a\u653e\u7f6e\u6c14\u6ce1\u3001\u8bbe\u7f6e\u6587\u5b57\u6837\u5f0f\u3001\u6dfb\u52a0\u5c3e\u5df4\u5e76\u5bfc\u51fa\u4f5c\u54c1\u3002",
    stepsTitle:"\u4f60\u7684\u7b2c\u4e00\u9875\u5b57\u6548",
    steps:[
        {t:"\u521b\u5efa\u65b0\u6587\u6863",d:"\u8fdb\u5165 <b>\u6587\u4ef6 \u2192 \u65b0\u5efa\u6587\u6863</b> \u6216\u6309 <kbd>Ctrl+N</kbd>\u3002\u5728 <b>\u6587\u4ef6 \u2192 \u6587\u6863\u8bbe\u7f6e</b> \u4e2d\u8c03\u6574\u9875\u9762\u5c3a\u5bf8\u3001DPI \u548c\u5355\u4f4d\u3002\u5e38\u7528\u9884\u8bbe\u5305\u62ec US Comic\u3001Manga B5 \u548c A4\u3002"},
        {t:"\u52a0\u8f7d\u4f5c\u54c1\u56fe\u7a3f",d:"\u901a\u8fc7 <b>\u5bf9\u8c61 \u2192 \u6253\u5f00\u56fe\u50cf</b> \u6216 <kbd>Ctrl+Shift+O</kbd> \u6dfb\u52a0\u80cc\u666f\u56fe\u3002\u4f60\u4e5f\u53ef\u4ee5\u76f4\u63a5\u5c06\u56fe\u50cf\u6587\u4ef6\u62d6\u653e\u5230\u753b\u5e03\u4e0a\u3002"},
        {t:"\u8bbe\u7f6e\u5206\u955c",d:"\u6309 <kbd>P</kbd> \u8fdb\u5165\u5206\u955c\u5e03\u5c40\u6a21\u5f0f\u3002\u4f7f\u7528\u7ed8\u56fe\u5de5\u5177\uff08\u77e9\u5f62\u3001\u5706\u89d2\u77e9\u5f62\u3001\u692d\u5706\uff09\u5728\u56fe\u7a3f\u4e0a\u7ed8\u5236\u5206\u955c\u8fb9\u754c\u3002\u518d\u6309 <kbd>P</kbd> \u8fd4\u56de\u666e\u901a\u7f16\u8f91\u6a21\u5f0f\u3002"},
        {t:"\u521b\u5efa\u5bf9\u8bdd\u6c14\u6ce1",d:"\u6309 <kbd>B</kbd> \u6216\u70b9\u51fb\u5de5\u5177\u680f\u4e2d\u7684\u6c14\u6ce1\u5de5\u5177\uff0c\u7136\u540e\u70b9\u51fb\u753b\u5e03\u4e0a\u60f3\u8981\u653e\u7f6e\u6c14\u6ce1\u7684\u4f4d\u7f6e\u3002\u53cc\u51fb\u6c14\u6ce1\u53ef\u7f16\u8f91\u6587\u5b57\u3002"},
        {t:"\u8f93\u5165\u5e76\u8bbe\u7f6e\u5bf9\u8bdd\u6837\u5f0f",d:"\u5728\u6c14\u6ce1\u4e2d\u8f93\u5165\u5bf9\u8bdd\u3002\u4f7f\u7528\u53f3\u4fa7\u9762\u677f\u7684 <b>\u6587\u5b57</b> \u9009\u9879\u5361\u66f4\u6539\u5b57\u4f53\u3001\u5927\u5c0f\u3001\u989c\u8272\u548c\u5bf9\u9f50\u65b9\u5f0f\u3002<kbd>Ctrl+B</kbd> \u52a0\u7c97\uff0c<kbd>Ctrl+I</kbd> \u659c\u4f53\uff0c<kbd>Ctrl+U</kbd> \u4e0b\u5212\u7ebf\u3002"},
        {t:"\u9009\u62e9\u6c14\u6ce1\u5f62\u72b6",d:"\u9009\u4e2d\u6c14\u6ce1\u540e\uff0c\u4f7f\u7528\u53f3\u4fa7\u9762\u677f\u7684 <b>\u6c14\u6ce1</b> \u9009\u9879\u5361\u66f4\u6539\u5f62\u72b6\uff1a\u692d\u5706\u3001\u5706\u89d2\u77e9\u5f62\u3001\u77e9\u5f62\u3001\u601d\u8003\u6ce1\u6ce1\u3001\u7206\u70b8\u3001\u8033\u8bed\u7b49\u3002"},
        {t:"\u6dfb\u52a0\u6307\u5411\u8bf4\u8bdd\u8005\u7684\u5c3e\u5df4",d:"\u9009\u62e9\u6c14\u6ce1\u5e76\u6309 <kbd>T</kbd>\u3002\u5c3e\u5df4\u51fa\u73b0\u540e\uff0c\u5c06\u5176\u5c16\u7aef\u62d6\u5411\u8bf4\u8bdd\u7684\u89d2\u8272\u3002\u5728 <b>\u5c3e\u5df4</b> \u9009\u9879\u5361\u4e2d\u8c03\u6574\u5bbd\u5ea6\u548c\u66f2\u7387\u3002"},
        {t:"\u6392\u5217\u548c\u5fae\u8c03",d:"\u62d6\u52a8\u6c14\u6ce1\u91cd\u65b0\u5b9a\u4f4d\u3002\u4f7f\u7528 <b>\u7f16\u8f91 \u2192 \u5bf9\u9f50</b> \u548c <b>\u7f16\u8f91 \u2192 \u5206\u5e03</b> \u6574\u9f50\u591a\u4e2a\u6c14\u6ce1\u3002\u5bf9\u8bdd\u8de8\u6c14\u6ce1\u65f6\uff0c\u4f7f\u7528 <b>\u5bf9\u8c61 \u2192 \u94fe\u63a5\u6c14\u6ce1</b>\u3002"},
        {t:"\u6dfb\u52a0\u66f4\u591a\u9875\u9762",d:"\u6309 <kbd>Ctrl+Alt+N</kbd> \u6dfb\u52a0\u65b0\u9875\u3002\u4f7f\u7528\u5de6\u4fa7\u9762\u677f\u7684 <b>\u9875\u9762</b> \u9009\u9879\u5361\u6d4f\u89c8\u3001\u91cd\u65b0\u6392\u5e8f\u6216\u590d\u5236\u9875\u9762\u3002"},
        {t:"\u5bfc\u51fa\u5b8c\u6210\u7684\u4f5c\u54c1",d:"\u8fdb\u5165 <b>\u6587\u4ef6 \u2192 \u5bfc\u51fa</b> \u6216\u6309 <kbd>Ctrl+Shift+E</kbd>\u3002\u9009\u62e9\u683c\u5f0f\uff08PNG\u3001JPEG\u3001PDF\u3001CBZ\u3001EPUB \u7b49\uff09\uff0c\u8bbe\u7f6e DPI \u548c\u8d28\u91cf\uff0c\u7136\u540e\u70b9\u51fb\u5bfc\u51fa\u3002"}
    ],
    tipsTitle:"\u5b9e\u7528\u63d0\u793a",
    tips:[
        {l:"\u64a4\u9500\u9519\u8bef",d:"<kbd>Ctrl+Z</kbd> \u64a4\u9500\uff0c<kbd>Ctrl+Y</kbd> \u91cd\u505a\u3002\u51e0\u4e4e\u6240\u6709\u64cd\u4f5c\u90fd\u53ef\u4ee5\u64a4\u9500\u3002"},
        {l:"\u4f7f\u7528\u6837\u5f0f\u4fdd\u6301\u4e00\u81f4\u6027",d:"\u5c06\u6c14\u6ce1\u548c\u6587\u5b57\u8bbe\u7f6e\u4fdd\u5b58\u4e3a\u547d\u540d\u6837\u5f0f\uff0c\u65b9\u4fbf\u5728\u6574\u4e2a\u9879\u76ee\u4e2d\u5feb\u901f\u5e94\u7528\u3002"},
        {l:"\u4f7f\u7528\u6a21\u677f\u63d0\u9ad8\u6548\u7387",d:"\u5c06\u5e38\u7528\u6c14\u6ce1\u914d\u7f6e\u4fdd\u5b58\u4e3a\u6a21\u677f\uff0c\u5e76\u5206\u914d\u5230\u5feb\u6377\u952e <kbd>Alt+1</kbd> \u5230 <kbd>Alt+9</kbd>\u3002"},
        {l:"\u67e5\u627e\u548c\u66ff\u6362",d:"<kbd>Ctrl+F</kbd> \u5728\u6240\u6709\u6c14\u6ce1\u4e2d\u67e5\u627e\uff0c<kbd>Ctrl+H</kbd> \u67e5\u627e\u5e76\u66ff\u6362\u3002"},

    nextText:"\u60f3\u4e86\u89e3\u66f4\u591a\uff1f\u5b8c\u6574\u5e2e\u52a9\u6307\u5357\u8be6\u7ec6\u4ecb\u7ecd\u4e86\u6bcf\u4e2a\u529f\u80fd\u3002",

"ja":{
    title:"Letterist \u3092\u59cb\u3081\u3088\u3046",
    subtitle:"\u521d\u3081\u3066\u306e\u30b3\u30df\u30c3\u30af\u30da\u30fc\u30b8\u3092\u30ec\u30bf\u30ea\u30f3\u30b0\u3059\u308b\u30b9\u30c6\u30c3\u30d7\u30d0\u30a4\u30b9\u30c6\u30c3\u30d7\u30ac\u30a4\u30c9",
    welcome:"\u3088\u3046\u3053\u305d\uff01\u3053\u306e\u30ac\u30a4\u30c9\u3067\u306f\u3001\u521d\u3081\u3066\u306e\u30ec\u30bf\u30ea\u30f3\u30b0\u6e08\u307f\u30b3\u30df\u30c3\u30af\u30da\u30fc\u30b8\u3092\u6700\u521d\u304b\u3089\u6700\u5f8c\u307e\u3067\u4f5c\u6210\u3057\u307e\u3059\u3002\u5439\u304d\u51fa\u3057\u306e\u914d\u7f6e\u3001\u30c6\u30ad\u30b9\u30c8\u306e\u30b9\u30bf\u30a4\u30eb\u8a2d\u5b9a\u3001\u5c3b\u5c3e\u306e\u8ffd\u52a0\u3001\u66f8\u304d\u51fa\u3057\u306e\u65b9\u6cd5\u3092\u5b66\u3073\u307e\u3059\u3002",
    stepsTitle:"\u521d\u3081\u3066\u306e\u30ec\u30bf\u30ea\u30f3\u30b0\u30da\u30fc\u30b8",
    steps:[
        {t:"\u65b0\u898f\u30c9\u30ad\u30e5\u30e1\u30f3\u30c8\u3092\u4f5c\u6210",d:"<b>\u30d5\u30a1\u30a4\u30eb \u2192 \u65b0\u898f\u30c9\u30ad\u30e5\u30e1\u30f3\u30c8</b> \u307e\u305f\u306f <kbd>Ctrl+N</kbd>\u3002<b>\u30d5\u30a1\u30a4\u30eb \u2192 \u30c9\u30ad\u30e5\u30e1\u30f3\u30c8\u8a2d\u5b9a</b> \u3067\u30da\u30fc\u30b8\u30b5\u30a4\u30ba\u3001DPI\u3001\u5358\u4f4d\u3092\u8a2d\u5b9a\u3067\u304d\u307e\u3059\u3002US Comic\u3001Manga B5\u3001A4 \u306a\u3069\u306e\u30d7\u30ea\u30bb\u30c3\u30c8\u304c\u3042\u308a\u307e\u3059\u3002"},
        {t:"\u30a2\u30fc\u30c8\u30ef\u30fc\u30af\u3092\u8aad\u307f\u8fbc\u307f",d:"<b>\u30aa\u30d6\u30b8\u30a7\u30af\u30c8 \u2192 \u753b\u50cf\u3092\u958b\u304f</b> \u307e\u305f\u306f <kbd>Ctrl+Shift+O</kbd> \u3067\u80cc\u666f\u753b\u50cf\u3092\u8ffd\u52a0\u3002\u753b\u50cf\u30d5\u30a1\u30a4\u30eb\u3092\u30ad\u30e3\u30f3\u30d0\u30b9\u306b\u30c9\u30e9\u30c3\u30b0\uff06\u30c9\u30ed\u30c3\u30d7\u3059\u308b\u3053\u3068\u3082\u3067\u304d\u307e\u3059\u3002"},
        {t:"\u30d1\u30cd\u30eb\u3092\u8a2d\u5b9a",d:"<kbd>P</kbd> \u3067\u30d1\u30cd\u30eb\u30ec\u30a4\u30a2\u30a6\u30c8\u30e2\u30fc\u30c9\u306b\u5165\u308a\u307e\u3059\u3002\u63cf\u753b\u30c4\u30fc\u30eb\uff08\u77e9\u5f62\u3001\u89d2\u4e38\u77e9\u5f62\u3001\u6955\u5186\uff09\u3067\u30d1\u30cd\u30eb\u5883\u754c\u3092\u63cf\u304d\u307e\u3059\u3002<kbd>P</kbd> \u3067\u901a\u5e38\u7de8\u96c6\u306b\u623b\u308a\u307e\u3059\u3002"},
        {t:"\u5439\u304d\u51fa\u3057\u3092\u4f5c\u6210",d:"<kbd>B</kbd> \u307e\u305f\u306f\u30c4\u30fc\u30eb\u30d0\u30fc\u306e\u5439\u304d\u51fa\u3057\u30c4\u30fc\u30eb\u3092\u30af\u30ea\u30c3\u30af\u3057\u3001\u30ad\u30e3\u30f3\u30d0\u30b9\u4e0a\u3092\u30af\u30ea\u30c3\u30af\u3002\u30c0\u30d6\u30eb\u30af\u30ea\u30c3\u30af\u3067\u30c6\u30ad\u30b9\u30c8\u3092\u7de8\u96c6\u3067\u304d\u307e\u3059\u3002"},
        {t:"\u30bb\u30ea\u30d5\u3092\u5165\u529b\u30fb\u30b9\u30bf\u30a4\u30eb\u8a2d\u5b9a",d:"\u5439\u304d\u51fa\u3057\u306b\u30bb\u30ea\u30d5\u3092\u5165\u529b\u3002\u53f3\u30d1\u30cd\u30eb\u306e <b>\u30c6\u30ad\u30b9\u30c8</b> \u30bf\u30d6\u3067\u30d5\u30a9\u30f3\u30c8\u3001\u30b5\u30a4\u30ba\u3001\u8272\u3001\u914d\u7f6e\u3092\u5909\u66f4\u3002<kbd>Ctrl+B</kbd> \u592a\u5b57\u3001<kbd>Ctrl+I</kbd> \u659c\u4f53\u3001<kbd>Ctrl+U</kbd> \u4e0b\u7dda\u3002"},
